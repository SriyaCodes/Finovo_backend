name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker
        run: |
          cd ~/Finovo_backend
          docker stop finovo-backend || true
          docker rm finovo-backend || true
          docker rmi finovo-backend || true
          docker build -t finovo-backend .
          docker run -d \
            --name finovo-backend \
            --restart=always \
            --env-file /home/ubuntu/.env \
            -p 8000:8000 \
            finovo-backend